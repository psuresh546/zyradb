spring.application.name=zyradb
zyra.tcp.port=6380

# WAL sync mode: always or periodic
zyra.wal.sync-mode=periodic
# Flush interval in milliseconds when sync mode is periodic.
# Lower values favor durability; higher values generally favor throughput.
zyra.wal.force-interval-ms=100

logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
